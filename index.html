<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Necs Hub</title>
  <link rel="icon" href="slave.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <header class="top-bar">
        <div class="logo-container">
          <img src="perchance.png" alt="Necs Hub Logo" class="app-logo">
          <h1 class="page-title">NECS Hub</h1>
        </div>
        <div class="top-actions">
          <div class="search-container" id="search-container">
            <button id="search-toggle" class="icon-btn" title="Search"><span class="material-icons">search</span></button>
            <input type="search" id="search" placeholder="Search tools..." />
          </div>
          <button id="settings-toggle" class="icon-btn" onclick="UI.openModal('modal-settings')" title="Settings">
            <span class="material-icons">settings</span>
          </button>
        </div>
      </header>

      <nav id="breadcrumb-nav" class="breadcrumb-nav"></nav>

      <div id="content" class="tools-container"></div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay" onclick="UI.closeModal()"></div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal">
    <h2>Settings</h2>
    <div class="settings-content">
      <div class="setting-group">
        <label>Theme</label>
        <div class="theme-options">
          <button class="btn-theme" onclick="PageTools.setTheme('light')">Light</button>
          <button class="btn-theme" onclick="PageTools.setTheme('dark')">Dark</button>
        </div>
      </div>
      <div class="setting-group">
        <label>Accent Color</label>
        <div class="accent-options">
          <div class="accent-pill indigo" onclick="PageTools.setAccent('indigo')"></div>
          <div class="accent-pill green" onclick="PageTools.setAccent('green')"></div>
          <div class="accent-pill red" onclick="PageTools.setAccent('red')"></div>
          <div class="accent-pill purple" onclick="PageTools.setAccent('purple')"></div>
        </div>
      </div>
      <div class="setting-group">
        <label>Data Management</label>
        <div class="data-actions">
          <button class="btn-data" onclick="Tools.exportData()">Export Data</button>
          <label class="btn-data">
            Import Data
            <input type="file" accept="application/json" onchange="Tools.importData(this)" style="display:none;" />
          </label>
          <button class="btn-data danger" onclick="Tools.resetData()">Reset Dashboard</button>
        </div>
      </div>
      <div class="setting-group">
        <label>Actions</label>
        <div class="data-actions">
          <button class="btn-data" onclick="UI.openModal('modal-add')">Add Tool</button>
          <button class="btn-data" onclick="UI.openAboutModal()">About</button>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

  <!-- URL Selection Modal -->
  <div id="modal-url-selection" class="modal">
    <h2 id="modal-title-urls">Select URL</h2>
    <div id="url-list" class="url-list"></div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal-add" class="modal">
    <h2 id="modal-title">Add Tool</h2>
    <form id="tool-form" onsubmit="UI.handleFormSubmit(event)">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="tool-title" required placeholder="My Tool">
      </div>
      <div class="form-group">
        <label>Primary URL</label>
        <input type="url" id="tool-url" required placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Alternative URLs <button type="button" class="btn-small" onclick="UI.addUrlField()">+ Add</button></label>
        <div id="alternative-urls-container"></div>
      </div>
      <div class="form-group">
        <label>Icon (URL or Emoji)</label>
        <input type="text" id="tool-icon" placeholder="e.g. 🚀 or https://...">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="tool-category" list="category-list" required placeholder="Utilities">
        <datalist id="category-list"></datalist>
      </div>
      <div class="form-actions">
        <button type="button" onclick="UI.closeModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>

  <!-- About Modal -->
  <div id="modal-about" class="modal">
    <div class="modal-header">
      <h2>Description</h2>
    </div>
    <div class="about-content" id="about-content" style="max-height: 400px; overflow-y: auto; margin: 1rem 0;"></div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

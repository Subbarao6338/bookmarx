<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nex Bookmarks</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <header class="top-bar">
        <div class="logo-container">
          <img src="perchance.png" alt="Nex Bookmarks Logo" class="app-logo">
          <h1 class="page-title">Nex Bookmarks</h1>
        </div>
      </header>

      <div id="hero-section" class="hero-section">
        <h1 id="hero-title" class="hero-title">Nex Bookmarks</h1>
        <p id="hero-subtitle" class="hero-subtitle">Access your favorite links and resources.</p>
        <div class="hero-actions">
          <button class="btn-hero" onclick="UI.collapseAll()"><span class="material-icons">unfold_less</span> Collapse All</button>
          <button class="btn-hero" onclick="UI.expandAll()"><span class="material-icons">unfold_more</span> Expand All</button>
        </div>
      </div>

      <nav id="category-chips" class="category-chips"></nav>

      <div id="content" class="tools-container"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" id="nav-bookmarks" onclick="UI.switchTab('bookmarks')">
        <span class="material-icons">bookmark</span>
        <span class="nav-label">Bookmarks</span>
      </button>
      <button class="nav-item" id="nav-search" onclick="UI.switchTab('search')">
        <span class="material-icons">search</span>
        <span class="nav-label">Search</span>
      </button>
      <button class="nav-item" id="nav-settings" onclick="UI.switchTab('settings')">
        <span class="material-icons">settings</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="modal-overlay" onclick="UI.closeModal()"></div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal">
    <h2>Settings</h2>
    <div class="settings-content">
      <section class="settings-section">
        <h3 class="settings-section-title"><span class="material-icons">palette</span> Appearance</h3>
        <div class="setting-group">
          <label>Theme</label>
          <div class="theme-options">
            <button class="btn-theme" onclick="PageTools.setTheme('light')">Light</button>
            <button class="btn-theme" onclick="PageTools.setTheme('dark')">Dark</button>
          </div>
        </div>
        <div class="setting-group">
          <label>Accent Color</label>
          <div class="accent-options">
            <div class="accent-pill indigo" onclick="PageTools.setAccent('indigo')" title="Indigo"></div>
            <div class="accent-pill green" onclick="PageTools.setAccent('green')" title="Green"></div>
            <div class="accent-pill red" onclick="PageTools.setAccent('red')" title="Red"></div>
            <div class="accent-pill purple" onclick="PageTools.setAccent('purple')" title="Purple"></div>
            <div class="accent-pill orange" onclick="PageTools.setAccent('orange')" title="Orange"></div>
            <div class="accent-pill teal" onclick="PageTools.setAccent('teal')" title="Teal"></div>
            <div class="accent-pill pink" onclick="PageTools.setAccent('pink')" title="Pink"></div>
            <div class="accent-pill amber" onclick="PageTools.setAccent('amber')" title="Amber"></div>
            <div class="accent-pill cyan" onclick="PageTools.setAccent('cyan')" title="Cyan"></div>
            <div class="accent-pill forest" onclick="PageTools.setAccent('forest')" title="Forest"></div>
            <div class="accent-pill earth" onclick="PageTools.setAccent('earth')" title="Earth"></div>
            <div class="accent-pill sky" onclick="PageTools.setAccent('sky')" title="Sky"></div>
            <div class="accent-pill leaf" onclick="PageTools.setAccent('leaf')" title="Leaf"></div>
          </div>
        </div>
      </section>

      <section class="settings-section">
        <h3 class="settings-section-title"><span class="material-icons">storage</span> Data Management</h3>
        <div class="data-actions">
          <button class="btn-data" onclick="Tools.exportData()"><span class="material-icons">download</span> Export Data</button>
          <label class="btn-data">
            <span class="material-icons">upload</span> Import Data
            <input type="file" accept="application/json" onchange="Tools.importData(this)" style="display:none;" />
          </label>
          <button class="btn-data danger" onclick="Tools.resetData()"><span class="material-icons">restart_alt</span> Reset Dashboard</button>
        </div>
      </section>

      <section class="settings-section">
        <h3 class="settings-section-title"><span class="material-icons">bolt</span> Quick Actions</h3>
        <div class="data-actions">
          <button class="btn-data" onclick="UI.openModal('modal-add')"><span class="material-icons">add_box</span> Add Tool</button>
          <button class="btn-data" onclick="UI.openAboutModal()"><span class="material-icons">info</span> About</button>
        </div>
      </section>
    </div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Done</button>
    </div>
  </div>

  <!-- Tool Actions Modal -->
  <div id="modal-tool-actions" class="modal">
    <h2 id="tool-actions-title">Tool Actions</h2>
    <div id="tool-actions-content" class="tool-actions-content">
      <div class="action-section">
        <h3>URLs</h3>
        <div id="tool-actions-urls" class="url-list-compact"></div>
      </div>
      <div class="action-section">
        <h3>Management</h3>
        <div class="management-actions">
          <button id="btn-copy-all" class="btn-data"><span class="material-icons">content_copy</span> Copy All URLs</button>
          <button id="btn-edit-tool" class="btn-data"><span class="material-icons">edit</span> Edit Tool</button>
          <button id="btn-delete-tool" class="btn-data danger"><span class="material-icons">delete</span> Delete Tool</button>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

  <!-- URL Selection Modal -->
  <div id="modal-url-selection" class="modal">
    <h2 id="modal-title-urls">Select URL</h2>
    <div id="url-list" class="url-list"></div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal-add" class="modal">
    <h2 id="modal-title">Add Tool</h2>
    <form id="tool-form" onsubmit="UI.handleFormSubmit(event)">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="tool-title" required placeholder="My Tool">
      </div>
      <div class="form-group">
        <label>Primary URL</label>
        <input type="url" id="tool-url" required placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Alternative URLs <button type="button" class="btn-small" onclick="UI.addUrlField()">+ Add</button></label>
        <div id="alternative-urls-container"></div>
      </div>
      <div class="form-group">
        <label>Icon (URL or Emoji)</label>
        <input type="text" id="tool-icon" placeholder="e.g. 🚀 or https://...">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="tool-category" list="category-list" required placeholder="Utilities">
        <datalist id="category-list"></datalist>
      </div>
      <div class="form-actions">
        <button type="button" onclick="UI.closeModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>

  <!-- About Modal -->
  <div id="modal-about" class="modal">
    <div class="modal-header">
      <h2>Description</h2>
    </div>
    <div class="about-content" id="about-content" style="max-height: 400px; overflow-y: auto; margin: 1rem 0;"></div>
    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

    <div id="toast" class="toast"></div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
